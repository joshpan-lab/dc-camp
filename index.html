<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大衛門徒營 - #DC 動態經文卡</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; overflow-x: hidden; background: #0f172a; }
        .app-card { background: rgba(30, 41, 59, 0.95); backdrop-filter: blur(10px); }
        .btn-genz { background-color: #bef264; color: #0f172a; transition: all 0.3s; text-transform: uppercase; letter-spacing: 1px; }
        .btn-genz:hover { background-color: #ffffff; transform: translateY(-2px); box-shadow: 0 10px 20px -5px rgba(190, 242, 100, 0.4); }
        .btn-genz:active { transform: translateY(0); scale: 0.98; }
        .card-container { perspective: 1000px; }
        .card { transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275); transform-style: preserve-3d; }
        .card.is-flipped { transform: rotateY(180deg); }
        .card-face { backface-visibility: hidden; position: absolute; width: 100%; height: 100%; border-radius: 1.5rem; }
        .card-back { transform: rotateY(180deg); }
        
        /* 吃角子老虎機的專屬樣式 */
        .slot-box {
            background: #1e293b;
            border: 2px solid #334155;
            border-radius: 0.75rem;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
            box-shadow: inset 0 4px 6px rgba(0,0,0,0.5);
            transition: all 0.2s;
        }
        .slot-text {
            font-family: monospace;
            font-weight: 900;
            color: #bef264;
            text-shadow: 0 0 8px rgba(190, 242, 100, 0.5);
        }
        /* 定格時的閃爍與發光特效 */
        .slot-locked {
            border-color: #bef264;
            background: #0f172a;
            box-shadow: 0 0 15px rgba(190, 242, 100, 0.4), inset 0 0 10px rgba(190, 242, 100, 0.2);
            transform: scale(1.05);
        }
        .slot-locked .slot-text {
            color: #ffffff;
            text-shadow: 0 0 10px #bef264, 0 0 20px #bef264;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div id="app-container" class="app-card rounded-3xl shadow-2xl max-w-sm w-full overflow-hidden border border-slate-700">
        
        <div class="bg-indigo-600 p-8 text-center relative overflow-hidden">
            <h1 class="text-4xl font-black tracking-tighter text-white relative z-10">#大衛門徒營</h1>
            <p class="text-indigo-200 mt-2 text-sm font-bold relative z-10">專屬祝福卡・看見神對你的心意</p>
        </div>

        <!-- 表單區塊 -->
        <div id="form-section" class="p-8">
            <form id="draw-form" class="space-y-5">
                <div>
                    <label class="block text-sm font-bold text-slate-300 mb-1">你的名字</label>
                    <input type="text" id="userName" required class="w-full px-4 py-3 rounded-xl bg-slate-800 border-2 border-slate-600 text-white font-bold outline-none focus:border-bef264">
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-300 mb-1">電子信箱 (作為抽卡唯一憑證)</label>
                    <input type="email" id="userEmail" required class="w-full px-4 py-3 rounded-xl bg-slate-800 border-2 border-slate-600 text-white font-bold outline-none focus:border-bef264">
                </div>
                <div class="flex items-start bg-slate-800/50 p-3 rounded-lg border border-slate-700">
                    <input type="checkbox" id="igCheck" required class="mt-1 w-5 h-5 text-fuchsia-500 rounded bg-slate-700 border-slate-500 flex-shrink-0">
                    <label for="igCheck" class="ml-3 text-sm text-slate-300 font-bold">我已追蹤官方 IG</label>
                </div>
                
                <!-- 個資保護聲明 -->
                <div class="p-3 bg-slate-900/50 rounded-lg border border-slate-700/50">
                    <p class="text-[10px] text-slate-400 leading-tight text-justify">
                        【個資蒐集聲明】依據個人資料保護法第八條規定，大衛門徒營為辦理抽卡與活動聯繫之目的，將蒐集您的姓名與信箱。本單位僅於活動期間使用，不作其他用途。若不提供將無法參與抽卡。
                    </p>
                </div>

                <p id="test-mode-warning" class="text-xs text-fuchsia-400 font-bold text-center hidden">※ 目前為模擬測試模式，不會真實寄信 ※</p>
                
                <button type="submit" id="submit-btn" class="btn-genz w-full font-black py-4 px-4 rounded-xl shadow-lg mt-2 text-lg">
                    🎰 啟動拉霸抽卡
                </button>
            </form>
        </div>

        <!-- 拉霸機動畫區塊 (Slot Machine) -->
        <div id="slot-machine-section" class="p-8 hidden flex flex-col items-center justify-center h-80 relative">
            <h3 class="text-white font-bold mb-6 tracking-widest text-sm animate-pulse">CONNECTING TO HEAVEN...</h3>
            
            <!-- 三個滾動方塊 -->
            <div class="flex space-x-3 w-full justify-center mb-8">
                <!-- 第一格：書卷名 -->
                <div id="slot-1" class="slot-box w-20 h-24">
                    <span id="slot-text-1" class="slot-text text-sm sm:text-base writing-vertical-rl text-center">書卷</span>
                </div>
                <!-- 第二格：章節 -->
                <div id="slot-2" class="slot-box w-20 h-24">
                    <span id="slot-text-2" class="slot-text text-lg">00:00</span>
                </div>
                <!-- 第三格：禮物 -->
                <div id="slot-3" class="slot-box w-20 h-24">
                    <span id="slot-text-3" class="slot-text text-3xl">🎁</span>
                </div>
            </div>

            <p class="text-slate-400 text-xs font-bold mt-4" id="slot-status">正在為你抽取專屬經文與小禮物...</p>
        </div>

        <!-- 抽卡結果區塊 -->
        <div id="result-section" class="p-6 hidden flex flex-col items-center">
            <h2 class="text-xl font-bold text-white mb-4 text-center" id="greeting-text"></h2>
            
            <div class="card-container w-full aspect-[4/5] relative" id="verse-card-container">
                <div class="card w-full h-full relative rounded-2xl shadow-2xl" id="verse-card">
                    <div class="card-face bg-slate-800 flex items-center justify-center border-4 border-slate-600">
                        <span class="text-slate-400 text-6xl font-black">?</span>
                    </div>
                    <div id="dynamic-card-front" class="card-face card-back flex flex-col justify-center items-center text-center p-6 border-4 border-white">
                        <p id="verse-zh" class="text-white text-lg font-bold leading-relaxed mb-4"></p>
                        <p id="verse-en" class="text-white/70 text-[10px] font-medium italic mb-6"></p>
                        <span id="verse-ref" class="text-xs font-black text-slate-900 bg-white px-4 py-1.5 rounded-full uppercase"></span>
                    </div>
                </div>
            </div>

            <!-- 兌換糖果指示區塊 -->
            <div class="mt-6 w-full bg-white p-4 rounded-xl border-4 border-bef264 text-center transform hover:scale-105 transition shadow-[0_0_15px_rgba(190,242,100,0.3)]">
                <p class="text-slate-500 text-xs font-bold mb-1">憑此畫面至兌換區領取小禮物：</p>
                <p id="snack-name" class="text-slate-900 text-xl font-black"></p>
            </div>

            <div class="mt-4 text-center w-full">
                <button onclick="resetForm()" class="w-full text-slate-400 hover:text-white text-sm font-bold py-2 underline transition">讓下一位青年抽卡</button>
            </div>
        </div>
    </div>

    <script>
        // --- ★★★ 這裡請貼上你完整的 40 節經文陣列 ★★★ ---
        const verses = [
            { ref: "撒母耳記上 16:7", zh: "耶和華不像人看人：人是看外貌；耶和華是看內心。", en: "The Lord does not look at the things people look at. People look at the outward appearance, but the Lord looks at the heart." },
            { ref: "撒母耳記上 17:45", zh: "你來攻擊我，是靠著刀槍和銅戟；我來攻擊你，是靠著萬軍之耶和華的名。", en: "You come against me with sword and spear and javelin, but I come against you in the name of the Lord Almighty." },
            { ref: "詩篇 16:11", zh: "你必將生命的道路指示我。在你面前有滿足的喜樂；在你右手中有永遠的福樂。", en: "You make known to me the path of life; you will fill me with joy in your presence, with eternal pleasures at your right hand." }
            // ... (其餘 37 節)
        ];

        // --- 糖果/小禮物綁定 ---
        const themeStyles = [
            { bg: "linear-gradient(135deg, #a855f7, #ec4899)", snack: "🍇 紫色葡萄軟糖", icon: "🍇" },
            { bg: "linear-gradient(135deg, #06b6d4, #3b82f6)", snack: "🧊 藍色沁涼薄荷糖", icon: "🧊" },
            { bg: "linear-gradient(135deg, #84cc16, #10b981)", snack: "🍏 綠色青蘋果糖", icon: "🍏" },
            { bg: "linear-gradient(135deg, #f43f5e, #f97316)", snack: "🍊 橘色可樂/橘子糖", icon: "🍊" },
            { bg: "linear-gradient(135deg, #4f46e5, #9333ea)", snack: "🍫 迷你巧克力", icon: "🍫" }
        ];

        // 用於拉霸機隨機跳動的假資料字典
        const fakeBooks = ["創世記", "出埃及記", "約書亞記", "撒母耳記", "列王紀", "詩篇", "箴言", "以賽亞書", "耶利米書", "馬太福音", "約翰福音", "羅馬書", "啟示錄"];
        const fakeNumbers = ["3:16", "23:1", "1:1", "8:28", "12:2", "4:13", "11:1", "5:22", "16:7", "40:31"];
        const fakeIcons = ["🍇", "🧊", "🍏", "🍊", "🍫", "🍓", "🍬", "🍭", "🍪", "🍩"];

        // ★★★ 請替換為真實的 GAS API 網址 ★★★
        const gasApiUrl = "https://script.google.com/macros/s/你的部署ID/exec";

        const form = document.getElementById('draw-form');
        const formSection = document.getElementById('form-section');
        const slotMachineSection = document.getElementById('slot-machine-section');
        const resultSection = document.getElementById('result-section');
        const card = document.getElementById('verse-card');
        const cardFront = document.getElementById('dynamic-card-front');
        
        // 取得拉霸機 DOM
        const slotText1 = document.getElementById('slot-text-1');
        const slotText2 = document.getElementById('slot-text-2');
        const slotText3 = document.getElementById('slot-text-3');
        const slotBox1 = document.getElementById('slot-1');
        const slotBox2 = document.getElementById('slot-2');
        const slotBox3 = document.getElementById('slot-3');
        const slotStatus = document.getElementById('slot-status');

        let slotInterval1, slotInterval2, slotInterval3;

        const isTestMode = gasApiUrl.includes("你的部署ID");
        if(isTestMode) document.getElementById('test-mode-warning').classList.remove('hidden');

        // 啟動拉霸機動畫
        function startSlotMachine() {
            // 讓字體快速隨機切換
            slotInterval1 = setInterval(() => { slotText1.innerText = fakeBooks[Math.floor(Math.random() * fakeBooks.length)]; }, 50);
            slotInterval2 = setInterval(() => { slotText2.innerText = fakeNumbers[Math.floor(Math.random() * fakeNumbers.length)]; }, 50);
            slotInterval3 = setInterval(() => { slotText3.innerText = fakeIcons[Math.floor(Math.random() * fakeIcons.length)]; }, 50);
        }

        // 停止拉霸機並定格結果 (帶有節奏感)
        function stopSlotMachine(name, randomVerse, randomTheme) {
            // 解析真實經文的書卷名與章節 (例如把 "撒母耳記上 16:7" 拆開)
            const refParts = randomVerse.ref.split(" ");
            const realBook = refParts[0] || "聖經";
            const realChapter = refParts[1] || "精選";

            // 依序停止第一格
            setTimeout(() => {
                clearInterval(slotInterval1);
                slotText1.innerText = realBook;
                slotBox1.classList.add('slot-locked');
            }, 500);

            // 依序停止第二格
            setTimeout(() => {
                clearInterval(slotInterval2);
                slotText2.innerText = realChapter;
                slotBox2.classList.add('slot-locked');
            }, 1200);

            // 依序停止第三格
            setTimeout(() => {
                clearInterval(slotInterval3);
                slotText3.innerText = randomTheme.icon;
                slotBox3.classList.add('slot-locked');
                slotStatus.innerText = "✨ 抽取完成！即將顯示結果 ✨";
                slotStatus.classList.add('text-bef264', 'animate-pulse');
            }, 1900);

            // 動畫結束，切換到結果畫面
            setTimeout(() => {
                showFinalResult(name, randomVerse, randomTheme);
            }, 3000);
        }

        function showFinalResult(name, randomVerse, randomTheme) {
            document.getElementById('greeting-text').innerText = `${name}，這是給你的祝福！`;
            document.getElementById('verse-zh').innerText = randomVerse.zh;
            document.getElementById('verse-en').innerText = randomVerse.en;
            document.getElementById('verse-ref').innerText = randomVerse.ref;
            document.getElementById('snack-name').innerText = randomTheme.snack;
            cardFront.style.background = randomTheme.bg; 

            slotMachineSection.classList.add('hidden');
            resultSection.classList.remove('hidden');
            
            setTimeout(() => {
                card.classList.add('is-flipped');
                confetti({ particleCount: 150, spread: 80, origin: { y: 0.6 }, colors: ['#bef264', '#ec4899', '#06b6d4', '#ffffff'] });
            }, 100);
        }

        form.addEventListener('submit', function(e) {
            e.preventDefault();
            const name = document.getElementById('userName').value.trim();
            const email = document.getElementById('userEmail').value.trim();

            formSection.classList.add('hidden');
            slotMachineSection.classList.remove('hidden');
            
            // 啟動動畫
            startSlotMachine();

            // 決定抽籤結果
            const randomVerse = verses[Math.floor(Math.random() * verses.length)];
            const randomTheme = themeStyles[Math.floor(Math.random() * themeStyles.length)];

            // 準備傳送資料
            const payload = {
                name: name, email: email,
                verseZh: randomVerse.zh, verseEn: randomVerse.en, verseRef: randomVerse.ref,
                bgColor: randomTheme.bg, snackName: randomTheme.snack
            };

            if (isTestMode) {
                // 測試模式
                setTimeout(() => {
                    if (Math.random() < 0.1) {
                        clearInterval(slotInterval1); clearInterval(slotInterval2); clearInterval(slotInterval3);
                        alert('⚠️ (模擬測試) 這個 Email 已經領取過專屬經文卡囉！');
                        resetForm(); return;
                    }
                    stopSlotMachine(name, randomVerse, randomTheme);
                }, 1000); 
            } else {
                // 真實 API 串接
                fetch(gasApiUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify(payload)
                })
                .then(response => response.json())
                .then(data => {
                    if(data.result === 'duplicate') {
                        clearInterval(slotInterval1); clearInterval(slotInterval2); clearInterval(slotInterval3);
                        alert('⚠️ 這個 Email 已經領取過專屬經文卡囉！把機會留給其他人吧～');
                        resetForm(); return;
                    }
                    stopSlotMachine(name, randomVerse, randomTheme);
                })
                .catch(error => {
                    clearInterval(slotInterval1); clearInterval(slotInterval2); clearInterval(slotInterval3);
                    alert('網路連線異常，請確認網路後再試一次！');
                    resetForm();
                });
            }
        });

        function resetForm() {
            form.reset();
            card.classList.remove('is-flipped');
            
            // 復原拉霸機狀態
            slotBox1.classList.remove('slot-locked');
            slotBox2.classList.remove('slot-locked');
            slotBox3.classList.remove('slot-locked');
            slotStatus.innerText = "正在為你抽取專屬經文與小禮物...";
            slotStatus.classList.remove('text-bef264', 'animate-pulse');

            resultSection.classList.add('hidden');
            slotMachineSection.classList.add('hidden');
            formSection.classList.remove('hidden');
            
            clearInterval(slotInterval1); clearInterval(slotInterval2); clearInterval(slotInterval3);
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    </script>
</body>
</html>
